info:
  contact: {}
  description: Service for course service ALOPE!
  title: Alope Course Course Service API
  version: "1.0"
paths:
  /courses:
    get:
      description: Get list courses without pagination
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.CourseListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.CourseErrorResponse'
      summary: Get all courses
      tags:
      - courses
  /courses/{id}:
    get:
      description: Get course by id
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.CourseResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.CourseErrorResponse'
      summary: Get course by id
      tags:
      - courses

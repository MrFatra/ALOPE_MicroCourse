services:
  # DB
  alope-db:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: alope_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: alope_db

  # Backend: Auth Service (Port 8081)
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      - alope-db
    environment:
      - PORT=8081
      - DB_HOST=alope-db
      - DB_USER=alope_user
      - DB_PASSWORD=password123
      - DB_NAME=alope_db
      - DB_PORT=5432
      - DB_SSLMODE=disable

  # Backend: Course Service (Port 8080)
  course-service:
    build: ./backend/course-service
    ports:
      - "8080:8080"
    depends_on:
      - alope-db
    environment:
      - PORT=8080

  # Frontend: Alope Course (Next.js - Port 3000)
  alope-course:
    build: ./frontend/alope-course
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1

  # Frontend: Alope Admin (React Vite - Port 3001)
  alope-admin:
    build: ./frontend/alope-admin
    ports:
      - "3001:80"
